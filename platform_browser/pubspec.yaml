name: tekartik_platform_browser
version: 0.5.0
description: Get the global platform context
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  pub_semver: ">=2.2.0"
  collection: ">=1.19.1"
  tekartik_platform:
    git:
      url: https://github.com/tekartik/platform.dart
      path: platform
  web: '>=0.5.0'
dev_dependencies:
  test: ">=1.31.0"
  dev_build: ">=1.1.7+3"
  tekartik_platform_test:
    path: ../platform_test
  build_runner: ">=2.15.0"
  build_test: ">=0.10.2"
  build_web_compilers: ">=4.4.19"
  process_run: ">=1.2.1+1"
resolution: workspace
